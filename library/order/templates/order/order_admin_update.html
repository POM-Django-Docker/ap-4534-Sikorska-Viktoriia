{% extends "base.html" %} {% block title %}Edit Order{% endblock %} {% block
content %}
<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Edit Order #{{ order.id }}</h1>
    <a href="{% url 'all_orders' %}" class="btn btn-outline-secondary btn-sm"
      >← Back</a
    >
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body">
      <form method="post">
        {% csrf_token %}

        <div class="mb-4">{{ form.as_p }}</div>

        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-success btn-lg">
            Update Order
          </button>
          <a href="{% url 'all_orders' %}" class="btn btn-light">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
