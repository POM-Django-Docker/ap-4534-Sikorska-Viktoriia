{% extends "base.html" %} {% block content %}
<div class="container mt-4">
  <h2>All Library Orders</h2>
  <table class="table mt-4 bg-white shadow-sm rounded">
    <thead class="table-light">
      <tr>
        <th>User</th>
        <th>Book</th>
        <th class="text-end">Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for o in orders %}
      <tr>
        <td>{{ o.user.email }}</td>
        <td>{{ o.book.name }}</td>
        <td class="text-end">
          <a href="{% url 'order_update' o.id %}" class="btn btn-sm btn-primary"
            >Edit</a
          >
          <a
            href="{% url 'order_close' o.id %}"
            class="btn btn-sm btn-outline-danger"
            >Close</a
          >
        </td>
      </tr>
      {% empty %}
      <tr>
        <td colspan="3" class="text-center py-5 text-muted">
          <h4>
            Замовлень поки немає. Спробуй замовити книгу як звичайний
            користувач.
          </h4>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
